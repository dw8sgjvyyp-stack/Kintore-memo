<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="筋トレMEMO">
  <title>筋トレMEMO</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="todayLabel"></p>
        <h1 id="screenTitle">ホーム</h1>
      </div>
      <button id="quickAddBtn" class="icon-button" type="button" aria-label="種目を追加">+</button>
    </header>

    <main id="view" class="view" tabindex="-1"></main>

    <nav class="tabbar" aria-label="メインナビゲーション">
      <button class="tab is-active" data-route="home" type="button"><span>⌂</span>ホーム</button>
      <button class="tab" data-route="history" type="button"><span>▥</span>履歴/分析</button>
      <button class="tab" data-route="wellness" type="button"><span>◉</span>体重/睡眠</button>
      <button class="tab" data-route="calendar" type="button"><span>□</span>カレンダー</button>
      <button class="tab" data-route="menus" type="button"><span>☰</span>メニュー</button>
    </nav>
  </div>

  <div id="modalRoot" class="modal-root" aria-live="polite"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="errorBanner" class="error-banner" hidden></div>

  <script src="./app.js" defer></script>
</body>
</html>
