<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#06111f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="筋トレMEMO">
  <title>筋トレMEMO</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div class="topbar-title">
        <p class="eyebrow" id="todayLabel"></p>
        <h1 id="screenTitle">ホーム</h1>
      </div>
      <button class="ghost compact-control" data-action="open-settings" type="button">設定</button>
      <button id="quickAddBtn" class="icon-button" type="button" aria-label="種目を追加">+</button>
    </header>

    <main id="view" class="view" tabindex="-1"></main>

    <nav class="tabbar" aria-label="メインナビゲーション">
      <button class="tab is-active" data-route="home" type="button"><span>⌂</span><b>ホーム</b></button>
      <button class="tab" data-route="menus" type="button"><span>◇</span><b>トレーニング</b></button>
      <button class="tab tab-plus" data-route="record" type="button" aria-label="トレーニングを記録"><span>+</span><b>記録</b></button>
      <button class="tab" data-route="calendar" type="button"><span>▤</span><b>履歴</b></button>
      <button class="tab" data-route="analytics" type="button"><span>▥</span><b>分析</b></button>
    </nav>
  </div>

  <div id="modalRoot" class="modal-root" aria-live="polite"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="errorBanner" class="error-banner" hidden></div>

  <script src="./app.js" defer></script>
</body>
</html>
